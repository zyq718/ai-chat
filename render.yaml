# Render 部署配置
services:
  - type: web
    name: ai-chat-backend
    runtime: python
    region: singapore  # 亚太地区
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT run:app
    healthCheckPath: /api/health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: AI_PROVIDER
        value: mock
      - key: CORS_ORIGINS
        sync: false  # 部署后手动设置前端域名
      - key: SECRET_KEY
        generateValue: true  # Render 自动生成
